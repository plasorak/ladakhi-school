<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Outer orange circle background -->
  <circle cx="50" cy="50" r="50" fill="#F26522"/>
  
  <!-- Inner white ring gap -->
  <circle cx="50" cy="50" r="42" fill="white"/>
  
  <!-- Inner blue-teal circle -->
  <circle cx="50" cy="50" r="36" fill="url(#blueGrad)"/>

  <defs>
    <radialGradient id="blueGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#5bc8d8"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </radialGradient>
  </defs>

  <!-- Lotus flower (all same color) -->
  <!-- Center petal -->
  <ellipse cx="50" cy="68" rx="8" ry="13" fill="#F5A623" transform="rotate(0,50,68)"/>
  <!-- Left petals -->
  <ellipse cx="38" cy="70" rx="7" ry="11" fill="#F5A623" transform="rotate(-25,38,70)"/>
  <ellipse cx="29" cy="74" rx="6" ry="9" fill="#F5A623" transform="rotate(-45,29,74)"/>
  <!-- Right petals -->
  <ellipse cx="62" cy="70" rx="7" ry="11" fill="#F5A623" transform="rotate(25,62,70)"/>
  <ellipse cx="71" cy="74" rx="6" ry="9" fill="#F5A623" transform="rotate(45,71,74)"/>

  <!-- Open book -->
  <!-- Left page - curves up and out like an open book -->
  <path d="M50,57 Q50,32 50,30 Q40,31 33,36 Q28,40 28,52 Q28,57 33,58 Z" fill="white" opacity="0.95"/>
  <!-- Right page -->
  <path d="M50,57 Q50,32 50,30 Q60,31 67,36 Q72,40 72,52 Q72,57 67,58 Z" fill="white" opacity="0.82"/>
  <!-- Page lines on left page -->
  <line x1="36" y1="44" x2="48" y2="43" stroke="#aaa" stroke-width="1" opacity="0.6"/>
  <line x1="35" y1="48" x2="48" y2="47" stroke="#aaa" stroke-width="1" opacity="0.6"/>
  <line x1="35" y1="52" x2="48" y2="51" stroke="#aaa" stroke-width="1" opacity="0.6"/>
  <!-- Page lines on right page -->
  <line x1="52" y1="43" x2="64" y2="44" stroke="#aaa" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="47" x2="65" y2="48" stroke="#aaa" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="51" x2="65" y2="52" stroke="#aaa" stroke-width="1" opacity="0.5"/>
  <!-- Book spine -->
  <line x1="50" y1="30" x2="50" y2="57" stroke="#ddd" stroke-width="1.2"/>
</svg>